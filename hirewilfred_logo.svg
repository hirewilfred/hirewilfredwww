<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="hirewilfred">
  <title>hirewilfred</title>
  <defs>
    <style>
      .orange { fill: #ff6b1a; }
      .black  { fill: #141414; }
      .stroke-orange { stroke: #ff6b1a; stroke-width: 3; fill: none; stroke-linecap: round; }
      .stroke-black  { stroke: #141414; stroke-width: 3; fill: none; stroke-linecap: round; }
      .node-orange { fill: #ff6b1a; }
      .node-black  { fill: #141414; }
      .node-dot-light { fill: #ffffff; stroke: #ff6b1a; stroke-width: 2; }
    </style>
  </defs>

  <!-- W mark: two seated figures forming a W -->
  <g transform="translate(20, 22)">
    <!-- Left figure (orange) -->
    <!-- Network graph above left figure -->
    <g>
      <line class="stroke-orange" x1="14"  y1="40" x2="42" y2="14"/>
      <line class="stroke-orange" x1="42"  y1="14" x2="68" y2="38"/>
      <line class="stroke-orange" x1="14"  y1="40" x2="68" y2="38"/>
      <circle class="node-orange" cx="14" cy="40" r="5"/>
      <circle class="node-dot-light" cx="42" cy="14" r="5"/>
      <circle class="node-orange" cx="68" cy="38" r="5"/>
    </g>
    <!-- Head -->
    <circle class="orange" cx="40" cy="58" r="9"/>
    <!-- Body forming left half of W -->
    <path class="orange" d="M 22 72 L 58 72 L 50 116 L 38 116 L 30 88 L 18 116 L 6 116 Z"/>

    <!-- Right figure (black) -->
    <g transform="translate(70, 0)">
      <line class="stroke-black" x1="14"  y1="40" x2="42" y2="14"/>
      <line class="stroke-black" x1="42"  y1="14" x2="68" y2="38"/>
      <line class="stroke-black" x1="14"  y1="40" x2="68" y2="38"/>
      <circle class="node-black" cx="14" cy="40" r="5"/>
      <circle class="node-orange" cx="42" cy="14" r="5"/>
      <circle class="node-black" cx="68" cy="38" r="5"/>
    </g>
    <circle class="black" cx="110" cy="58" r="9"/>
    <path class="black" d="M 92 72 L 128 72 L 120 116 L 108 116 L 100 88 L 88 116 L 76 116 Z"/>
  </g>

  <!-- Wordmark: "hire" black + "wilfred" orange -->
  <g transform="translate(190, 110)" font-family="'Outfit', 'Inter', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-weight="700" font-size="92" letter-spacing="-3">
    <text class="black"  x="0" y="0">hire</text>
    <text class="orange" x="180" y="0">wilfred</text>
  </g>
</svg>
