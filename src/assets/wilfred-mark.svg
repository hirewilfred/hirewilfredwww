<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" role="img" aria-label="Hire Wilfred">
  <title>Hire Wilfred</title>
  <g fill="#FF7A00" stroke="#FF7A00" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left figure network graph (top-left node cluster) -->
    <g stroke-width="6" fill="none">
      <line x1="14" y1="78" x2="58" y2="20"/>
      <line x1="58" y1="20" x2="102" y2="74"/>
      <line x1="14" y1="78" x2="102" y2="74"/>
    </g>
    <circle cx="14"  cy="78" r="9"/>
    <circle cx="58"  cy="20" r="9"/>
    <circle cx="102" cy="74" r="9"/>

    <!-- Right figure network graph (top-right node cluster) -->
    <g stroke-width="6" fill="none">
      <line x1="138" y1="74" x2="182" y2="20"/>
      <line x1="182" y1="20" x2="226" y2="78"/>
      <line x1="138" y1="74" x2="226" y2="78"/>
    </g>
    <circle cx="138" cy="74" r="9"/>
    <circle cx="182" cy="20" r="9"/>
    <circle cx="226" cy="78" r="9"/>

    <!-- Heads -->
    <circle cx="80"  cy="98" r="18" stroke="none"/>
    <circle cx="160" cy="98" r="18" stroke="none"/>

    <!-- W-shaped body — two seated figures forming the W -->
    <path stroke="none" d="
      M 40 122
      L 120 122
      L 120 162
      L 100 200
      L 70 200
      L 50 162
      Z"/>
    <path stroke="none" d="
      M 120 122
      L 200 122
      L 190 162
      L 170 200
      L 140 200
      L 120 162
      Z"/>
  </g>
</svg>
